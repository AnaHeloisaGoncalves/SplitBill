spring.application.name=splitbill

spring.datasource.url=jdbc:mysql://localhost:3306/db_splitbill?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration (Change secret in production)
jwt.secret=NGZmNDMyY2RmYTljYjBlYTBlYWY1ODI5OGMzMjZkMWNjZDliNWUzYTFjYzE0Y2M2YzljMjUxYWVmNzNlYzM1OWM=
jwt.access-token-expiration-minutes=15
jwt.refresh-token-expiration-days=7

# Cookie Configuration
app.cookie.secure=true
app.cookie.same-site=Strict
app.cookie.domain=""

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# if database already has schema, allow baseline
spring.flyway.baseline-on-migrate=true
